name: Refresh JS cache key

on:
  push:
    paths:
      - ".github/workflows/refresh-js-cache.yml"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update app.js cache key
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          for html_path in Path('.').glob('*.html'):
              html = html_path.read_text(encoding='utf-8')
              html = re.sub(
                  r'assets/app\.js(?:\?v=[^"\']+)?',
                  'assets/app.js?v=20260708-single-v1',
                  html,
              )
              html_path.write_text(html, encoding='utf-8')
          PY
      - name: Commit cache key update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add *.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Refresh app.js cache key after CSS consolidation"
            git push
          fi
