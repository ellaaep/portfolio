    <main>
      <section class="page-cover contact-cover">
        <h1>Napiš mi, co potřebuješ vytvořit.</h1>
        <p class="lead">Web, video, grafika nebo úprava existujícího projektu. Stačí krátce popsat, co má vzniknout.</p>
      </section>

      <section class="contact-layout">
        <form class="contact-form mail-window" id="contact-form" action="https://formsubmit.co/turkova.profi@gmail.com" method="POST">
          <input type="hidden" name="_subject" value="Nová zpráva z portfolia">
          <input type="hidden" name="_template" value="table">
          <div class="mail-toolbar">
            <div class="window-bar">
              <span></span>
              <span></span>
              <span></span>
            </div>
            <span class="mail-title">New Message</span>
            <button class="send-mail-btn" type="submit" aria-label="Odeslat zprávu">↑</button>
          </div>
          <label>
            <span>Jméno</span>
            <input type="text" name="name" autocomplete="name" required>
          </label>
          <label>
            <span>E-mail</span>
            <input type="email" name="email" autocomplete="email" required>
          </label>
          <label>
            <span>Zpráva</span>
            <textarea name="message" rows="7" required></textarea>
          </label>
          <button class="button" type="submit">Odeslat zprávu</button>
        </form>
        <aside class="contact-links">
          <h2>Kde mě najdeš</h2>
          <a href="https://github.com/ellaaep" target="_blank" rel="noreferrer">GitHub</a>
          <a href="mailto:turkova.profi@gmail.com">turkova.profi@gmail.com</a>
          <a href="https://www.instagram.com/turkovq/" target="_blank" rel="noreferrer">Instagram</a>
          <a href="https://www.tiktok.com/@ellaaep" target="_blank" rel="noreferrer">TikTok</a>
        </aside>
      </section>
