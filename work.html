<!doctype html>
<html lang="cs" data-theme="light">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Vybrané práce a grafický design v portfoliu Elišky Turkové.">
    <title>Práce | Eliška Turková</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/styles.css?v=20260708-video-footer-clean">
    <script src="assets/app.js?v=20260708-video-footer-clean" defer></script>
  </head>
  <body>
    <header class="site-header">
      <div class="header-shell">
        <a class="brand" href="index.html" aria-label="Domů">
          <img class="brand-memoji" src="assets/memoji-about.png" alt="Eliška Turková">
        </a>
        <div class="nav-shell">
          <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav">
            <span></span>
            <span></span>
          </button>
          <nav class="site-nav" id="site-nav" aria-label="Hlavní navigace">
            <a href="weby.html">Weby</a>
            <a href="work.html" aria-current="page">Edit</a>
            <a href="pricing.html">Ceník</a>
            <a href="spoluprace.html">Spolupráce</a>
            <a href="about.html">O mně</a>
            <a href="contact.html">Kontakt</a>
            <a href="https://github.com/ellaaep" target="_blank" rel="noreferrer">GitHub</a>
          </nav>
        </div>
        <div class="header-actions">
          <button class="theme-toggle" type="button" aria-label="Přepnout barevný režim">
            <span class="theme-thumb" aria-hidden="true"></span>
          </button>
        </div>
      </div>
    </header>

    <main>
      <section class="work-category motion-section" id="video" aria-labelledby="featured-video-title">
        <div class="motion-block">
          <div class="motion-subheading">
            <h2 id="featured-video-title">Vybrané práce</h2>
          </div>
          <div class="motion-featured-grid" data-video-featured></div>
        </div>

        <div class="motion-block motion-timeline-block">
          <div class="motion-subheading motion-subheading-filtered">
            <h3>Podle roku</h3>
            <div class="motion-filters" aria-label="Filtrovat edity podle roku">
              <button type="button" data-video-filter="2026" aria-pressed="true">2026</button>
              <button type="button" data-video-filter="2025" aria-pressed="false">2025</button>
              <button type="button" data-video-filter="2024" aria-pressed="false">2024</button>
              <button type="button" data-video-filter="2023" aria-pressed="false">2023</button>
              <button type="button" data-video-filter="2022" aria-pressed="false">2022</button>
              <button type="button" data-video-filter="all" aria-pressed="false">Zobrazit více</button>
            </div>
          </div>
          <div class="motion-year-groups" data-video-years></div>
        </div>
      </section>
    </main>

    <div class="video-modal" data-video-modal hidden role="dialog" aria-modal="true" aria-labelledby="video-modal-title">
      <div class="video-modal-backdrop" data-video-close></div>
      <div class="video-modal-panel">
        <button class="video-modal-close" type="button" data-video-close aria-label="Zavřít video">×</button>
        <div class="video-modal-copy">
          <span data-video-modal-meta></span>
          <h2 id="video-modal-title" data-video-modal-title>Ukázka</h2>
        </div>
        <div class="video-modal-media" data-video-modal-media>
          <video controls preload="none" playsinline data-video-player></video>
        </div>
      </div>
    </div>

    <footer class="site-footer">
      <nav class="footer-socials" aria-label="Sociální odkazy">
        <a class="footer-icon" href="mailto:turkova.profi@gmail.com" aria-label="E-mail">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16v12H4z"></path><path d="m4 7 8 6 8-6"></path></svg>
        </a>
        <a class="footer-icon" href="https://www.instagram.com/turkovq/" target="_blank" rel="noreferrer" aria-label="Instagram">
          <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="5" y="5" width="14" height="14" rx="4"></rect><circle cx="12" cy="12" r="3.2"></circle><circle cx="16.7" cy="7.3" r="0.8"></circle></svg>
        </a>
        <a class="footer-icon" href="https://www.tiktok.com/@ellaaep" target="_blank" rel="noreferrer" aria-label="TikTok">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14 4v9.3a4 4 0 1 1-3.9-4"></path><path d="M14 4c1 3 2.7 4.7 5 5"></path></svg>
        </a>
        <a class="footer-icon" href="https://github.com/ellaaep" target="_blank" rel="noreferrer" aria-label="GitHub">
          <img src="assets/logos/skills/github.svg" alt="">
        </a>
      </nav>
    </footer>
  </body>
</html>
