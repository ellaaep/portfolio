<!doctype html>
<html lang="cs" data-theme="light">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Vybrané video edity a archiv prací podle roku.">
    <title>Video | Eliška Turková</title>

    <link rel="icon" type="image/png" href="assets/favicon.png?v=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Indie+Flower&family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/styles.css?v=20260709-red-doodles-final">
    <script src="assets/app.js?v=20260709-red-doodles-final" defer></script>
  </head>
  <body>
    <header class="site-header">
      <div class="header-shell">
        <a class="brand" href="index.html" aria-label="Domů">
          <img class="brand-memoji" src="assets/memoji-about.png" alt="Eliška Turková">
        </a>
        <div class="nav-shell">
          <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav">
            <span></span>
            <span></span>
          </button>
          <nav class="site-nav" id="site-nav" aria-label="Hlavní navigace">
            <a href="weby.html">Weby</a>
            <a href="work.html" aria-current="page">Video</a>
            <a href="pricing.html">Ceník</a>
            <a href="spoluprace.html">Spolupráce</a>
            <a href="about.html">O mně</a>
            <a href="contact.html">Kontakt</a>
                      </nav>
        </div>
        <div class="header-actions">
          <button class="theme-toggle" type="button" aria-label="Přepnout barevný režim">
            <span class="theme-thumb" aria-hidden="true"></span>
          </button>
        </div>
      </div>
    </header>

    <main>
      <section class="work-category motion-section" id="video" aria-labelledby="featured-video-title">
        <div class="motion-block">
          <div class="motion-subheading">
            <h2 id="featured-video-title">3 vybrané práce</h2>
          </div>
          <div class="motion-featured-grid" data-featured-videos aria-label="Vybrané videopráce"></div>
        </div>

        <div class="motion-block motion-timeline-block">
          <div class="motion-subheading motion-subheading-filtered">
            <h3>Edity podle roku</h3>
            <label class="motion-year-select-wrap">
              <span class="sr-only">Vyber rok</span>
              <select class="motion-year-select" data-video-year-select aria-label="Vyber rok editů">
                <option value="2026">2026</option>
                <option value="2025">2025</option>
                <option value="2024">2024</option>
                <option value="2023">2023</option>
                <option value="2022">2022</option>
              </select>
            </label>
          </div>
          <div class="motion-year-groups" data-video-years></div>
        </div>
      </section>
    </main>

    <div class="video-modal" data-video-modal hidden role="dialog" aria-modal="true" aria-labelledby="video-modal-title">
      <div class="video-modal-backdrop" data-video-close></div>
      <div class="video-modal-panel">
        <button class="video-modal-close" type="button" data-video-close aria-label="Zavřít video">×</button>
        <div class="video-modal-copy">
          <span data-video-modal-meta></span>
          <h2 id="video-modal-title" data-video-modal-title>Ukázka</h2>
          <p data-video-modal-description></p>
        </div>
        <div class="video-modal-media" data-video-modal-media>
          <video controls preload="none" playsinline data-video-player></video>
        </div>
      </div>
    </div>

    <footer class="site-footer">
      <span>Eliška Turková</span>
      <span>weby / video / grafika</span>
    </footer>
  </body>
</html>
